{% extends "auth/base_auth.html" %}
{% block title %}Sign In{% endblock %}
{% block auth_title %}Welcome back{% endblock %}
{% block auth_subtitle %}Sign in to your household{% endblock %}

{% block auth_content %}
{% if error %}
<div class="mb-4 px-4 py-3 bg-red-50 border border-red-100 rounded-xl text-sm text-red-600">
  {{ error }}
</div>
{% endif %}

<form method="POST" action="/login" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
    <input type="text" name="username" autocomplete="username" required autofocus
           class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none text-sm transition-all" />
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
    <input type="password" name="password" autocomplete="current-password" required
           class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none text-sm transition-all" />
  </div>
  <button type="submit"
          class="w-full py-2.5 bg-primary-500 hover:bg-primary-600 text-white font-semibold rounded-xl transition-colors text-sm mt-2">
    Sign in
  </button>
</form>
{% endblock %}
