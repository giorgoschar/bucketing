<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sign In{% endblock %} — Expenses</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: { 500: '#6366f1', 600: '#4f46e5' } },
          fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="h-full bg-gray-50 font-sans antialiased flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-500 rounded-2xl mb-4 shadow-lg shadow-primary-500/30">
        <span class="text-2xl">💰</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">{% block auth_title %}Expenses{% endblock %}</h1>
      <p class="text-sm text-gray-500 mt-1">{% block auth_subtitle %}{% endblock %}</p>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</body>
</html>
