{% extends "base.html" %}
{% block title %}Edit Transaction{% endblock %}
{% block header_title %}Edit Transaction{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white dark:bg-gray-900 rounded-2xl border border-gray-100 dark:border-gray-800 p-6">
    <form method="POST" action="/transactions/{{ txn.id }}/edit" class="space-y-4">

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Amount</label>
          <input type="number" name="amount" step="0.01" min="0" value="{{ txn.amount }}" required
                 class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:bg-white focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none text-sm" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Currency</label>
          <select name="currency" class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:border-primary-500 outline-none text-sm">
            {% for c in currencies %}
            <option value="{{ c }}" {% if txn.currency == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Bucket</label>
        <select name="bucket_id" class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:border-primary-500 outline-none text-sm">
          {% for b in buckets %}
          <option value="{{ b.id }}" {% if txn.bucket_id == b.id %}selected{% endif %}>{{ b.icon }} {{ b.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Date</label>
        <input type="date" name="transaction_date" value="{{ txn.transaction_date.isoformat() }}" required
               class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:bg-white focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none text-sm" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Type</label>
        <select name="type" class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:border-primary-500 outline-none text-sm">
          {% for t in ['expense', 'income', 'transfer'] %}
          <option value="{{ t }}" {% if txn.type.value == t %}selected{% endif %}>{{ t | capitalize }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Category</label>
        <select name="category_id" class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:border-primary-500 outline-none text-sm">
          <option value="">No category</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}" {% if txn.category_id == cat.id %}selected{% endif %}>{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Paid by</label>
        <select name="paid_by" class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:border-primary-500 outline-none text-sm">
          <option value="">Not specified</option>
          {% for m in members %}
          <option value="{{ m.id }}" {% if txn.paid_by == m.id %}selected{% endif %}>{{ m.display_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Notes</label>
        <input type="text" name="notes" value="{{ txn.notes or '' }}" placeholder="Optional note"
               class="w-full px-3.5 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 focus:bg-white focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none text-sm" />
      </div>

      <div class="flex gap-3 pt-2">
        <a href="/buckets/{{ txn.bucket_id }}"
           class="flex-1 py-2.5 text-center border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 font-semibold rounded-xl text-sm hover:bg-gray-50 transition-colors">
          Cancel
        </a>
        <button type="submit"
                class="flex-1 py-2.5 bg-primary-500 hover:bg-primary-600 text-white font-semibold rounded-xl text-sm transition-colors">
          Save changes
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
